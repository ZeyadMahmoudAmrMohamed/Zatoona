services:
  - type: web
    name: zatoona-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.app
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zatoona-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # ── Copy your actual values from .env into Render's dashboard ──
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LIGHTNING_API_KEY
        sync: false
      - key: LIGHTNING_BASE_URL
        value: https://lightning.ai/api/v1/
      - key: LIGHTNING_MODEL_NAME
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHROMA_PERSIST_DIR
        value: /app/chroma_db
      - key: CHROMA_COLLECTION_NAME
        value: student_notes
      # MCP server runs as a thread inside this container
      - key: MCP_SERVER_HOST
        value: localhost
      - key: MCP_SERVER_PORT
        value: "8000"
      - key: RETRIEVAL_TOP_K
        value: "5"
      - key: RETRIEVAL_MODE
        value: hybrid
      - key: RERANK_ENABLED
        value: "true"
      - key: RERANKER_MODEL
        value: cross-encoder/ms-marco-MiniLM-L-6-v2
      - key: DOCLING_OCR_ENGINE
        value: rapidocr
      - key: DOCLING_DO_OCR
        value: "true"
      - key: CHUNK_MODE
        value: hybrid
      - key: CHUNK_MAX_TOKENS
        value: "512"
      - key: ASR_PROVIDER
        value: local
      - key: ASR_MODEL
        value: base
      - key: VIDEO_ENABLED
        value: "false"
      - key: USE_REAL_MCP
        value: "true"
      - key: USE_REAL_EXAM
        value: "true"
      - key: USE_REAL_ANSWERS
        value: "true"
      - key: MAX_VALIDATION_ITERATIONS
        value: "3"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

databases:
  - name: zatoona-db
    plan: free
